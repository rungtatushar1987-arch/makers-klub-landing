<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Makers Klub — App UI Kit (Print)</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  html, body { background: #ede7dc; margin: 0; padding: 0; }

  /* ===== Cover page ===== */
  .cover {
    width: 100%;
    min-height: 100vh;
    padding: 64px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: #ede7dc;
    break-after: page;
  }
  .cover .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 2.2px; text-transform: uppercase; color: var(--mk-ochre); font-weight: 700; margin-bottom: 18px; }
  .cover h1 { font-family: var(--font-display); font-weight: 800; font-size: 80px; letter-spacing: -2px; line-height: 0.98; color: var(--mk-navy); max-width: 800px; }
  .cover h1 em { color: var(--mk-lavender); font-style: italic; }
  .cover p { color: var(--fg-2); font-size: 16px; line-height: 1.65; max-width: 620px; margin-top: 18px; }
  .cover-foot { display: flex; justify-content: space-between; align-items: flex-end; font-size: 11px; color: var(--fg-3); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }

  /* ===== Per-screen page ===== */
  .page {
    width: 100%;
    min-height: 100vh;
    padding: 56px 48px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #ede7dc;
    break-before: page;
    break-inside: avoid;
  }
  .page-header { width: 100%; max-width: 900px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border-1); padding-bottom: 14px; }
  .page-header .num { font-family: var(--font-display); font-weight: 800; font-size: 28px; color: var(--mk-ochre); letter-spacing: -0.5px; }
  .page-header .name { font-family: var(--font-display); font-weight: 800; font-size: 28px; color: var(--mk-navy); letter-spacing: -0.5px; }
  .page-header .meta { font-size: 11px; color: var(--fg-3); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
  .page-desc { max-width: 640px; text-align: center; color: var(--fg-2); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }

  .device {
    width: 360px; height: 760px; background: var(--mk-cream);
    border-radius: 38px; border: 10px solid #1a1a1a;
    box-shadow: 0 24px 60px rgba(15,30,61,0.18);
    position: relative; overflow: hidden;
  }
  .device::before {
    content: ''; position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%); width: 120px; height: 28px;
    background: #1a1a1a; border-radius: 999px; z-index: 10;
  }

  /* ===== Print rules ===== */
  @page {
    size: A4 portrait;
    margin: 0;
  }
  @media print {
    html, body { width: 210mm; }
    .page, .cover { min-height: 297mm; height: 297mm; page-break-inside: avoid; break-inside: avoid; }
    .device { box-shadow: 0 8px 24px rgba(15,30,61,0.15); }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ScreenHome.jsx"></script>
<script type="text/babel" src="ScreenBrief.jsx"></script>
<script type="text/babel" src="ScreenMatch.jsx"></script>
<script type="text/babel" src="ScreenSession.jsx"></script>
<script type="text/babel" src="ScreenMemory.jsx"></script>
<script type="text/babel">
const SCREENS = [
  ['home','Home','Match feed + monthly group + directory.', ScreenHome],
  ['brief','Brief','Step 2 of 5 of the brief onboarding — answers what kind of person they are.', ScreenBrief],
  ['match','Match reveal','Once-a-month moment when your group drops. Four cards, four bios, one confirm.', ScreenMatch],
  ['session','Session','Detail page for the upcoming co-work session — info tiles, agenda timeline.', ScreenSession],
  ['memory','Memory','Past sessions + people. Quote-style notes preserve what was actually talked about.', ScreenMemory],
];
function App() {
  return (
    <React.Fragment>
      <section className="cover">
        <div>
          <div className="eyebrow">Makers Klub · App UI Kit</div>
          <h1>The member experience, <em>frame by frame</em></h1>
          <p>A high-fidelity mobile kit built on the same cream / navy / ochre vocabulary as the marketing site. Five canonical screens covering signup, monthly match, session detail, and memory of past meetings.</p>
        </div>
        <div className="cover-foot">
          <span>Makers Klub Design System</span>
          <span>v2 · May 2026</span>
        </div>
      </section>
      {SCREENS.map(([k,name,desc,Screen],i) => (
        <section key={k} className="page">
          <div className="page-header">
            <div className="num">{String(i+1).padStart(2,'0')}</div>
            <div className="name">{name}</div>
            <div className="meta">App · Screen {i+1} of {SCREENS.length}</div>
          </div>
          <p className="page-desc">{desc}</p>
          <div className="device"><Screen /></div>
        </section>
      ))}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-print once fonts and JSX are ready
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 800));
  window.print();
})();
</script>
</body>
</html>
