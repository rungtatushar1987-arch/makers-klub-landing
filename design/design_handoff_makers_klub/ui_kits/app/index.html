<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Makers Klub — App UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { background: #ede7dc; min-height: 100vh; }
  .stage-shell { padding: 56px 32px 96px; }
  .stage-header { max-width: 1280px; margin: 0 auto 48px; }
  .stage-header .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 2.2px; text-transform: uppercase; color: var(--mk-ochre); font-weight: 700; margin-bottom: 14px; }
  .stage-header h1 { font-family: var(--font-display); font-weight: 800; font-size: 56px; letter-spacing: -1.4px; line-height: 1.0; color: var(--mk-navy); max-width: 800px; }
  .stage-header h1 em { color: var(--mk-lavender); font-style: italic; }
  .stage-header p { color: var(--fg-2); font-size: 16px; line-height: 1.65; max-width: 640px; margin-top: 16px; }
  .frames-row { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; align-items: flex-start; max-width: 1700px; margin: 0 auto; }
  .frame-cell { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .device { width: 360px; height: 760px; background: var(--mk-cream); border-radius: 38px; border: 10px solid #1a1a1a; box-shadow: 0 24px 60px rgba(15,30,61,0.18); position: relative; overflow: hidden; }
  .device::before { content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #1a1a1a; border-radius: 999px; z-index: 10; }
  .frame-label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .frame-label .num { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--mk-ochre); font-weight: 700; }
  .frame-label .name { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--mk-navy); }
  .frame-label .desc { font-size: 12px; color: var(--fg-3); max-width: 240px; text-align: center; line-height: 1.5; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ScreenHome.jsx"></script>
<script type="text/babel" src="ScreenBrief.jsx"></script>
<script type="text/babel" src="ScreenMatch.jsx"></script>
<script type="text/babel" src="ScreenSession.jsx"></script>
<script type="text/babel" src="ScreenMemory.jsx"></script>
<script type="text/babel" src="ScreenSplash.jsx"></script>
<script type="text/babel">
const SCREENS = [
  ['splash','Splash','First-launch splash with animated mark + dot-pulse.', ScreenSplash],
  ['home','Home','Match feed + monthly group + directory.', ScreenHome],
  ['brief','Brief','Step 2 of 5 — what describes you?', ScreenBrief],
  ['match','Match reveal','Once-a-month moment your group drops.', ScreenMatch],
  ['session','Session','Detail page for the upcoming co-work session.', ScreenSession],
  ['memory','Memory','Past sessions + people, with quotes & follow-ups.', ScreenMemory],
  ['loader-dots','Loader · Dots','Generic inline loader — used for fast fetches.', LoaderDots],
  ['loader-match','Loader · Match shuffle','Themed loader for the monthly match reveal.', LoaderMatch],
  ['loader-skel','Loader · Skeleton','For the directory + memory feeds.', LoaderSkeleton],
];
function App() {
  return (
    <div className="stage-shell" data-screen-label="App UI Kit">
      <header className="stage-header">
        <div className="eyebrow">Makers Klub · App UI Kit</div>
        <h1>The member experience, <em>frame by frame</em></h1>
        <p>A high-fidelity mobile kit built on the same cream / navy / ochre vocabulary as the marketing site. Five canonical screens covering signup, monthly match, session detail, in-session, and memory of past meetings.</p>
      </header>
      <div className="frames-row">
        {SCREENS.map(([k,name,desc,Screen],i) => (
          <div key={k} className="frame-cell" data-screen-label={`${String(i+1).padStart(2,'0')} ${name}`}>
            <div className="device"><Screen /></div>
            <div className="frame-label">
              <div className="num">{String(i+1).padStart(2,'0')}</div>
              <div className="name">{name}</div>
              <div className="desc">{desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
