<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="height:200px;justify-content:flex-start;">
  <div class="label" style="margin-bottom:14px;">Spacing & Radii</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;">
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:48px;background:var(--mk-ochre);border-radius:4px;"></div><div class="tiny">4 · xs</div></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:48px;background:var(--mk-ochre);border-radius:8px;"></div><div class="tiny">8 · sm</div></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:48px;background:var(--mk-ochre);border-radius:12px;"></div><div class="tiny">12 · md / cards</div></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:48px;background:var(--mk-ochre);border-radius:18px;"></div><div class="tiny">18 · lg</div></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:64px;height:48px;background:var(--mk-ochre);border-radius:24px;"></div><div class="tiny">24 · xl / hero</div></div>
    <div class="col" style="gap:6px;align-items:center;"><div style="width:80px;height:36px;background:var(--mk-ochre);border-radius:999px;"></div><div class="tiny">999 · pill (CTAs)</div></div>
  </div>
  <div class="label" style="margin-top:20px;margin-bottom:10px;">Spacing</div>
  <div class="row" style="gap:12px;align-items:center;flex-wrap:wrap;">
    <span class="tiny">4·8·12·16·24·32·48·80·120</span>
  </div>
</body></html>
