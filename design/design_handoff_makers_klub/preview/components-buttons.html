<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="height:200px;justify-content:flex-start;">
  <div class="label" style="margin-bottom:18px;">Buttons</div>
  <div class="row" style="gap:12px;flex-wrap:wrap;">
    <button class="mk-btn mk-btn-ochre">Join the waitlist</button>
    <button class="mk-btn mk-btn-navy">How it works</button>
    <button class="mk-btn mk-btn-ghost">Login</button>
    <button class="mk-btn mk-btn-link">Read more →</button>
  </div>
  <div class="row" style="gap:12px;flex-wrap:wrap;margin-top:16px;">
    <button class="mk-btn mk-btn-ochre mk-btn-sm">Save event</button>
    <button class="mk-btn mk-btn-navy mk-btn-sm">View brief</button>
    <button class="mk-btn mk-btn-ochre mk-btn-lg">Reserve my spot →</button>
  </div>
  <div class="tiny" style="margin-top:16px;">All pill (999px). Ochre = primary, Navy = secondary, Ghost = tertiary, Link = inline.</div>
</body></html>
