<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apply to Join — Makers Klub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .apply-content {
      max-width: 640px;
      margin: 0 auto;
      padding: 140px 40px 100px;
    }
    .apply-content .label {
      display: block;
      text-align: center;
    }
    .apply-content h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 400;
      letter-spacing: -1.5px;
      line-height: 1.1;
      color: var(--fg);
      text-align: center;
      margin-bottom: 16px;
    }
    .apply-content h1 em {
      font-style: italic;
      color: var(--ochre);
    }
    .apply-content p.intro {
      font-size: 16px;
      color: var(--fg-2);
      line-height: 1.7;
      text-align: center;
      max-width: 460px;
      margin: 0 auto 48px;
    }
    .apply-embed {
      background: white;
      border: 1px solid var(--cream-3);
      border-radius: 20px;
      padding: 8px;
    }
    @media (max-width: 768px) {
      .apply-content { padding: 100px 24px 60px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">
    <img src="logo.svg" alt="Makers Klub" />
    <span class="nav-logo-text">Makers Klub</span>
  </a>
  <div class="nav-right">
    <a href="/#events" class="nav-link">Events</a>
    <a href="/#membership" class="nav-link">Membership</a>
    <a href="https://luma.com/calendar/cal-GBRc6zCvxA5bqnz" target="_blank" class="nav-cta">See upcoming events →</a>
  </div>
</nav>

<div class="apply-content">
  <span class="label">Membership</span>
  <h1>Apply to <em>join.</em></h1>
  <p class="intro">Tell us a bit about yourself. We review every application personally — approved members hear back within a few days.</p>

  <div class="apply-embed">
    <iframe data-tally-src="https://tally.so/embed/Pde8pd?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="500" frameborder="0" marginheight="0" marginwidth="0" title="Apply to Join"></iframe>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <a href="/" class="footer-logo">
    <img src="logo.svg" alt="Makers Klub" />
    <span class="footer-logo-text">Makers Klub</span>
  </a>
  <div class="footer-links">
    <a href="https://luma.com/calendar/cal-GBRc6zCvxA5bqnz" target="_blank">Events</a>
    <a href="https://tally.so/r/J9JAjJ" target="_blank">Platform waitlist</a>
    <a href="https://linkedin.com/company/makers-klub" target="_blank">LinkedIn</a>
    <a href="/impressum.html">Impressum</a>
    <a href="/datenschutz.html">Datenschutz</a>
  </div>
  <p class="footer-copy">© 2026 Makers Klub. Berlin.</p>
</footer>

<script>
  var d = document, w = "https://tally.so/widgets/embed.js",
    v = function () {
      "undefined" != typeof Tally ? Tally.loadEmbeds() : d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) { e.src = e.dataset.tallySrc; });
    };
  if ("undefined" != typeof Tally) v();
  else if (d.querySelector('script[src="' + w + '"]') == null) {
    var s = d.createElement("script");
    s.src = w; s.onload = v; s.onerror = v;
    d.body.appendChild(s);
  }
</script>

</body>
</html>
